name: Feature request
description: Suggest a scoped improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem, research need, or user workflow motivates this request?
      placeholder: This would help because...
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
      placeholder: Add / change / support...
    validations:
      required: true
  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider, and why are they less suitable?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Clarify what is in scope and out of scope for this request.
      placeholder: |
        In scope:
        - ...

        Out of scope:
        - ...
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add references, sketches, related issues, or implementation notes if useful.
    validations:
      required: false
