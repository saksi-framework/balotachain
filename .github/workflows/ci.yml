name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  # The Saksi cryptographic framework lives in its own repository
  # (github.com/saksi-framework/saksi) and is consumed as a dependency. This
  # repository's CI covers the TypeScript/Tauri workspaces, the voter Flutter
  # app, and the self-contained backend crates (bulletin-store, bulletin-gateway).
  # Crates that depend on Saksi via a path dependency (balota-encrypt, e2e-runner,
  # the Tauri src-tauri backends) are exercised in the Saksi-aware checkouts /
  # locally; they need the sibling saksi repo to build.
  FORCE_COLOR: 1

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint TypeScript and JavaScript
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  typecheck:
    name: Typecheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # Apps import @balotachain/ui by its built entrypoints (dist), so build it
      # before typechecking the workspaces that consume it.
      - name: Build shared UI package
        run: pnpm --filter @balotachain/ui build

      - name: Typecheck TypeScript workspaces
        run: pnpm typecheck

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # Apps resolve @balotachain/ui from its built dist at test time.
      - name: Build shared UI package
        run: pnpm --filter @balotachain/ui build

      - name: Test TypeScript workspaces
        run: pnpm test

  flutter:
    name: Voter app (Flutter)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: apps/voter
        run: flutter pub get

      - name: Analyze
        working-directory: apps/voter
        run: flutter analyze

      - name: Test
        working-directory: apps/voter
        run: flutter test

  rust-core:
    name: Backend crates (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/bulletin-store
            crates/bulletin-gateway

      - name: Test bulletin-store
        working-directory: crates/bulletin-store
        run: cargo test

      - name: Test bulletin-gateway
        working-directory: crates/bulletin-gateway
        run: cargo test

  fabric:
    # Real Hyperledger Fabric bulletin board: bring up the test-network, deploy
    # the saksi chaincode, and record one real ballot on-chain. Verifies the
    # Fabric base (which can't run on the dev box — its path has a space that
    # breaks fabric-samples). Heavy, so it skips PRs; runs on push to main and
    # manual dispatch.
    name: Fabric bulletin (real chaincode)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - name: Check out balotachain
        uses: actions/checkout@v4

      - name: Check out saksi (chaincode + client-sdk)
        uses: actions/checkout@v4
        with:
          repository: saksi-framework/saksi
          path: saksi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"

      - name: Install Fabric (samples, binaries, images)
        run: |
          curl -sSL https://raw.githubusercontent.com/hyperledger/fabric/main/scripts/install-fabric.sh -o install-fabric.sh
          chmod +x install-fabric.sh
          ./install-fabric.sh --fabric-version 2.5.15 binary docker samples

      - name: Vendor chaincode dependencies
        working-directory: saksi/packages/saksi-bulletin/chaincode
        run: go mod vendor

      - name: Bring up network and deploy chaincode
        env:
          FABRIC_SAMPLES: ${{ github.workspace }}/fabric-samples
        run: |
          export PATH="$GITHUB_WORKSPACE/bin:$FABRIC_SAMPLES/bin:$PATH"
          cd saksi/packages/saksi-bulletin/network
          ./network.sh all

      - name: Record one real ballot on-chain
        env:
          FABRIC_SAMPLES: ${{ github.workspace }}/fabric-samples
        run: |
          export PATH="$GITHUB_WORKSPACE/bin:$FABRIC_SAMPLES/bin:$PATH"
          cd saksi/packages/saksi-bulletin/network
          ./run-one-transaction.sh

      - name: Tear down network
        if: always()
        env:
          FABRIC_SAMPLES: ${{ github.workspace }}/fabric-samples
        run: |
          export PATH="$GITHUB_WORKSPACE/bin:$FABRIC_SAMPLES/bin:$PATH"
          cd saksi/packages/saksi-bulletin/network
          ./network.sh down || true

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript workspaces
        run: pnpm build

  security:
    name: Security (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # Audit production dependencies (what actually ships in the clients).
      # Dev-only tooling advisories (test runner / bundler dev server) are not
      # part of any shipped artifact and are kept current via dependency bumps.
      - name: Audit Node dependencies
        run: pnpm audit --prod --audit-level moderate
