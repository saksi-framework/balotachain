name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  # The Saksi cryptographic framework lives in its own repository
  # (github.com/saksi-framework/saksi) and is consumed as a dependency. This
  # repository's CI covers the TypeScript/Tauri workspaces, the voter Flutter
  # app, and the self-contained backend crates (bulletin-store, bulletin-gateway).
  # Crates that depend on Saksi via a path dependency (balota-encrypt, e2e-runner,
  # the Tauri src-tauri backends) are exercised in the Saksi-aware checkouts /
  # locally; they need the sibling saksi repo to build.
  FORCE_COLOR: 1

jobs:
  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint TypeScript and JavaScript
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  typecheck:
    name: Typecheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # Apps import @balotachain/ui by its built entrypoints (dist), so build it
      # before typechecking the workspaces that consume it.
      - name: Build shared UI package
        run: pnpm --filter @balotachain/ui build

      - name: Typecheck TypeScript workspaces
        run: pnpm typecheck

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # Apps resolve @balotachain/ui from its built dist at test time.
      - name: Build shared UI package
        run: pnpm --filter @balotachain/ui build

      - name: Test TypeScript workspaces
        run: pnpm test

  flutter:
    name: Voter app (Flutter)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: apps/voter
        run: flutter pub get

      - name: Analyze
        working-directory: apps/voter
        run: flutter analyze

      - name: Test
        working-directory: apps/voter
        run: flutter test

  rust-core:
    name: Backend crates (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            crates/bulletin-store
            crates/bulletin-gateway

      - name: Test bulletin-store
        working-directory: crates/bulletin-store
        run: cargo test

      - name: Test bulletin-gateway
        working-directory: crates/bulletin-gateway
        run: cargo test

  adapter:
    # Pure mapping test for the fabric-adapter (saksi protobuf -> BalotaChain
    # bulletin JSON). No Fabric needed, so it runs on PRs too. Needs saksi as a
    # sibling checkout for the path-replaced client-sdk / saksi-protocol modules.
    name: Fabric adapter (mapping)
    runs-on: ubuntu-latest
    steps:
      - name: Check out balotachain
        uses: actions/checkout@v4
        with:
          path: balotachain

      - name: Check out saksi
        uses: actions/checkout@v4
        with:
          repository: saksi-framework/saksi
          path: saksi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"

      - name: Test mapping
        working-directory: balotachain/services/fabric-adapter
        run: go test ./...

  fabric:
    # Real Hyperledger Fabric bulletin board, end to end on Linux (it can't run
    # on the dev box — that path has a space that breaks fabric-samples):
    # bring up the test-network, deploy the saksi chaincode, run the saksi demo
    # to record a REAL election lifecycle on-chain (CreateElection -> DKG ->
    # ballots -> close -> partial decryptions -> tally), then start the balotachain
    # fabric-adapter and assert GET /bulletin returns that real election + tally.
    # Heavy, so it skips PRs; runs on push to main and manual dispatch.
    name: Fabric bulletin (real election + adapter)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    env:
      FABRIC_SAMPLES: ${{ github.workspace }}/fabric-samples
    steps:
      - name: Check out balotachain
        uses: actions/checkout@v4
        with:
          path: balotachain

      - name: Check out saksi (chaincode + client-sdk + demo)
        uses: actions/checkout@v4
        with:
          repository: saksi-framework/saksi
          path: saksi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.4"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Fabric (samples, binaries, images)
        run: |
          curl -sSL https://raw.githubusercontent.com/hyperledger/fabric/main/scripts/install-fabric.sh -o install-fabric.sh
          chmod +x install-fabric.sh
          ./install-fabric.sh --fabric-version 2.5.15 binary docker samples

      - name: Vendor chaincode dependencies
        working-directory: saksi/packages/saksi-bulletin/chaincode
        run: go mod vendor

      - name: Bring up network and deploy chaincode
        run: |
          export PATH="$GITHUB_WORKSPACE/bin:$FABRIC_SAMPLES/bin:$PATH"
          cd saksi/packages/saksi-bulletin/network
          ./network.sh all

      - name: Record a real election on-chain (saksi demo)
        run: |
          export PATH="$GITHUB_WORKSPACE/bin:$FABRIC_SAMPLES/bin:$PATH"
          cd saksi
          ./tools/saksi-demo.sh gen
          ./tools/saksi-demo.sh cycle

      - name: Start adapter and assert GET /bulletin reflects the chain
        run: |
          set -euo pipefail
          ORG="$FABRIC_SAMPLES/test-network/organizations/peerOrganizations/org1.example.com"
          MSP="$ORG/users/User1@org1.example.com/msp"
          ELECTION_ID="$(jq -r .election_id /tmp/saksi-bundle.json)"
          echo "election id = $ELECTION_ID"

          cd balotachain/services/fabric-adapter
          go build -o /tmp/fabric-adapter .
          ELECTION_ID="$ELECTION_ID" \
          ADDR=127.0.0.1:8899 \
          PEER_ENDPOINT=localhost:7051 \
          GATEWAY_PEER=peer0.org1.example.com \
          TLS_CERT="$ORG/peers/peer0.org1.example.com/tls/ca.crt" \
          CERT="$(find "$MSP/signcerts" -type f | head -n1)" \
          KEY="$(find "$MSP/keystore" -type f | head -n1)" \
          /tmp/fabric-adapter &
          ADAPTER_PID=$!
          trap 'kill "$ADAPTER_PID" 2>/dev/null || true' EXIT

          for i in $(seq 1 20); do curl -fsS 127.0.0.1:8899/healthz && break || sleep 1; done
          echo
          curl -fsS 127.0.0.1:8899/bulletin -o /tmp/bulletin.json
          cat /tmp/bulletin.json | jq .

          jq -e --arg id "$ELECTION_ID" '.election.id == $id' /tmp/bulletin.json
          jq -e '(.tally.results | to_entries[0].value.candidates | length) > 0' /tmp/bulletin.json
          jq -e '.tally.trustees_total > 0' /tmp/bulletin.json
          echo "adapter served the real on-chain election + tally"

      - name: Tear down network
        if: always()
        run: |
          export PATH="$GITHUB_WORKSPACE/bin:$FABRIC_SAMPLES/bin:$PATH"
          cd saksi/packages/saksi-bulletin/network
          ./network.sh down || true

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript workspaces
        run: pnpm build

  security:
    name: Security (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # Audit production dependencies (what actually ships in the clients).
      # Dev-only tooling advisories (test runner / bundler dev server) are not
      # part of any shipped artifact and are kept current via dependency bumps.
      - name: Audit Node dependencies
        run: pnpm audit --prod --audit-level moderate
